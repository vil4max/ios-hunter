name: Weekly iOS Market Report

on:
  workflow_dispatch:
  schedule:
    # Monday 09:00 Europe/Kyiv (EEST = 06:00 UTC; EET winter = 07:00 UTC)
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: database/jobs.db
          key: ios-hunter-db-${{ github.repository }}-${{ hashFiles('database/jobs.db') }}
          restore-keys: |
            ios-hunter-db-${{ github.repository }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly report
        env:
          JOBS_DB_PATH: database/jobs.db
        run: python3 scripts/weekly_report.py

      - name: Commit weekly reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/weekly/ reports/companies/
          if git diff --staged --quiet; then
            echo "No weekly report changes."
          else
            git commit -m "chore(reports): update weekly market report"
            git push
          fi

      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: database/jobs.db
          key: ios-hunter-db-${{ github.repository }}-${{ hashFiles('database/jobs.db') }}
