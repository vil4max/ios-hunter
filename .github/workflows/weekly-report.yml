name: Weekly iOS Market Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: database/jobs.db
          key: ios-hunter-db-${{ github.repository }}-${{ hashFiles('database/jobs.db') }}
          restore-keys: |
            ios-hunter-db-${{ github.repository }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly report
        env:
          JOBS_DB_PATH: database/jobs.db
        run: python3 scripts/run_pipeline.py

      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: database/jobs.db
          key: ios-hunter-db-${{ github.repository }}-${{ hashFiles('database/jobs.db') }}
