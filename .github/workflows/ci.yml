name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift collector
        run: swift build -c release

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: python3 -m pytest -q

      - name: Verify imports
        run: python3 -c "from collector.companies import collect_all; from database.seen import load_seen; from integrations.notify import format_vacancies_message; from project_sync.sync import ProjectSync; from planner.plan import build_plan; from reporter.hourly import format_hourly_inbox_alert"
