name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift collector
        run: swift build -c release

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python3 -c "from collector.companies import collect_all; from ai.engine import create_analyzer; from parser.pipeline_steps import apply_job_change"
