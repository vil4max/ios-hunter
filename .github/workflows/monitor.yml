# Deprecated — use "Collect iOS Jobs" (collect.yml) instead.
# Kept for manual workflow_dispatch only.

name: Monitor iOS Jobs (legacy)

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare data directory
        run: mkdir -p database

      - name: Restore SQLite database
        uses: actions/cache/restore@v4
        with:
          path: database/swift.db
          key: ios-hunter-db-${{ github.repository }}-${{ hashFiles('database/swift.db') }}
          restore-keys: |
            ios-hunter-db-${{ github.repository }}-

      - name: Build
        run: swift build -c release

      - name: Run JobHunter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOBS_DB_PATH: database/swift.db
        run: swift run -c release JobHunter

      - name: Save SQLite database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: database/swift.db
          key: ios-hunter-db-${{ github.repository }}-${{ hashFiles('database/swift.db') }}
