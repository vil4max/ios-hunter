name: Monitor iOS Jobs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  monitor:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache SQLite database
        uses: actions/cache@v4
        with:
          path: data/jobs.sqlite
          key: jobs-sqlite-${{ github.repository }}

      - name: Build
        run: swift build -c release

      - name: Run JobHunter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOBS_DB_PATH: data/jobs.sqlite
        run: swift run -c release JobHunter
