name: Collect iOS Jobs

on:
  workflow_dispatch:
  # Scheduled hourly via .github/workflows/hourly-trigger.yml (ubuntu → workflow_dispatch).

permissions:
  contents: write

concurrency:
  group: collect-ios-jobs-${{ github.repository }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directories
        run: mkdir -p database reports/activity reports/health reports/market reports/timeline reports/company_watch reports/weekly reports/companies

      - name: Restore SQLite database
        uses: actions/cache/restore@v4
        with:
          path: database/jobs.db
          key: ios-hunter-db-${{ github.repository }}
          restore-keys: |
            ios-hunter-db-${{ github.repository }}-

      - name: Build Swift collector
        run: swift build -c release

      - name: Run Swift collector
        env:
          SWIFT_EXPORT_PATH: database/swift_export.json
        run: swift run -c release JobHunter

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Python pipeline
        env:
          JOBS_DB_PATH: database/jobs.db
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER: gemini
          AI_MODEL: gemini-2.0-flash
        run: python3 scripts/run_pipeline.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/activity/ \
            reports/health/ \
            reports/market/ \
            reports/timeline/ \
            reports/company_watch/ \
            reports/weekly/ \
            reports/companies/
          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore(reports): update pipeline reports"
            git push
          fi

      - name: Save SQLite database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: database/jobs.db
          key: ios-hunter-db-${{ github.repository }}
