name: Collect iOS Jobs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  collect:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directories
        run: mkdir -p data database reports/activity reports/health website/data

      - name: Restore SQLite databases
        uses: actions/cache/restore@v4
        with:
          path: |
            data/jobs.sqlite
            database/jobs.db
          key: ios-hunter-db-${{ github.repository }}-${{ hashFiles('database/jobs.db', 'data/jobs.sqlite') }}
          restore-keys: |
            ios-hunter-db-${{ github.repository }}-

      - name: Build Swift collector
        run: swift build -c release

      - name: Run Swift collector
        env:
          JOBS_DB_PATH: data/jobs.sqlite
          SWIFT_EXPORT_PATH: database/swift_export.json
        run: swift run -c release JobHunter

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Python pipeline
        env:
          JOBS_DB_PATH: database/jobs.db
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/run_pipeline.py

      - name: Save SQLite databases
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/jobs.sqlite
            database/jobs.db
          key: ios-hunter-db-${{ github.repository }}-${{ hashFiles('database/jobs.db', 'data/jobs.sqlite') }}
