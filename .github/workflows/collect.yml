name: Collect iOS Jobs

on:
  workflow_dispatch:
  # Scheduled hourly via .github/workflows/hourly-trigger.yml (ubuntu → workflow_dispatch).

permissions:
  contents: write
  issues: write

concurrency:
  group: collect-ios-jobs-${{ github.repository }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directories
        run: mkdir -p database

      - name: Build Swift collector
        run: swift build -c release

      - name: Run Swift collector
        env:
          SWIFT_EXPORT_PATH: database/swift_export.json
        run: swift run -c release JobHunter

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Python pipeline
        env:
          SEEN_PATH: database/seen.json
          SWIFT_EXPORT_PATH: database/swift_export.json
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          SEED_SEEN_ONLY: ${{ vars.SEED_SEEN_ONLY }}
          CAREER_AGENT_TOKEN: ${{ secrets.CAREER_AGENT_TOKEN }}
          CAREER_AGENT_SYNC_ENABLED: ${{ vars.CAREER_AGENT_SYNC_ENABLED }}
          CAREER_AGENT_SEEN_GATE: ${{ vars.CAREER_AGENT_SEEN_GATE }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CAREER_PROJECT_OWNER: ${{ vars.CAREER_PROJECT_OWNER }}
          CAREER_PROJECT_NUMBER: ${{ vars.CAREER_PROJECT_NUMBER }}
          PROJECT_BOARD_URL: ${{ vars.PROJECT_BOARD_URL }}
        run: python3 scripts/run_pipeline.py

      - name: Commit seen store
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add database/seen.json
          if git diff --staged --quiet; then
            echo "No seen.json changes to commit."
          else
            git commit -m "chore(seen): record notified vacancies [skip ci]"
            git push
          fi
