name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - website/**
      - database/jobs.json
      - index.html
      - .nojekyll
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r website/. _site/
          touch _site/.nojekyll
          mkdir -p _site/data
          if [ -f database/jobs.json ]; then
            cp database/jobs.json _site/data/jobs.json
          fi
          test -f _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
