name: Hourly Collect Trigger

on:
  workflow_dispatch:
  schedule:
    # Every hour UTC — dispatches Collect iOS Jobs (macos) reliably via ubuntu runner.
    - cron: "0 * * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: hourly-collect-trigger-${{ github.repository }}
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Collect iOS Jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          attempt=1
          max_attempts=5
          delay=15
          while true; do
            echo "Dispatch attempt ${attempt}/${max_attempts}"
            if gh workflow run "Collect iOS Jobs" --repo "${repo}" --ref main; then
              echo "Collect iOS Jobs dispatched successfully"
              exit 0
            fi
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "Failed to dispatch Collect iOS Jobs after ${max_attempts} attempts" >&2
              exit 1
            fi
            echo "Dispatch failed; retrying in ${delay}s"
            sleep "${delay}"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
