name: AI Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * 1"

jobs:
  ai-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: database/jobs.db
          key: ios-hunter-db-${{ github.repository }}
          restore-keys: |
            ios-hunter-db-${{ github.repository }}-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI weekly summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/ai_analysis.py --weekly

      - name: Commit AI report updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/weekly/
          if git diff --staged --quiet; then
            echo "No AI report changes."
          else
            git commit -m "chore(reports): append AI weekly summary"
            git push
          fi
