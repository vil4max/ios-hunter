facts:
  - id: globallogic_watch_ai
    employer: GlobalLogic
    tags: [ai, watchos, concurrency, product]
    technologies: [Swift, watchOS, SwiftUI, WatchKit, WatchConnectivity, AVFoundation, Swift Concurrency]
    facts:
      - Apple Watch Voice AI R&D with on-device conversation flows
      - iPhone relay for WebSocket and audio because Watch has no direct WebSocket path
      - TestFlight delivery under watchOS background, audio, and connectivity constraints
      - Beta-tested VelocityAI sample product cycle from idea to release
    approved_wording:
      - watchOS voice AI with on-device conversation flows.
      - No WebSocket on Watch — iPhone relay for audio and server sync; dedup with URLSessionWebSocketTask.
      - Split Watch/iPhone work around platform limits; TestFlight under watchOS constraints (background, audio, connectivity).
      - Beta-tested VelocityAI — ran a sample product cycle from idea to release.

